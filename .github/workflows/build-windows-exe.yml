name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Build ChronoCore EXE
        shell: pwsh
        run: .\scripts\build_windows_exe.ps1

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChronoCore-windows-exe
          path: |
            dist/ChronoCore.exe
            dist/ChronoCore-windows.zip
